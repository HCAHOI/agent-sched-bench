<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace Gantt &mdash; agent-sched-bench</title>
<style>
  /* JetBrains Mono: loaded async to avoid blocking; falls back to system monospace */

  :root {
    --bg: #0a0e14;
    --bg-header: #0d1117;
    --bg-panel: #111820;
    --border: #1e2633;
    --grid: #141a24;
    --text: #c5c8d4;
    --text-dim: #6b7280;
    --text-bright: #e8eaf0;
    --cyan: #00E5FF;
    --amber: #FF6D00;
    --green: #76FF03;
    --red: #FF1744;
    --sidebar-w: 200px;
    --header-h: 48px;
    --legend-h: 32px;
    --trace-list-h: 36px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;
    font-size: 12px;
    overflow: hidden;
    height: 100vh;
  }

  #header {
    height: var(--header-h);
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 24px;
  }

  #header .title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-bright);
    letter-spacing: 0.5px;
  }

  #header .meta {
    color: var(--text-dim);
    font-size: 11px;
  }

  #header .toggle-group {
    display: flex;
    gap: 2px;
    background: var(--bg);
    border-radius: 4px;
    padding: 2px;
  }

  #header .toggle-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    padding: 4px 12px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }

  #header .toggle-btn.active {
    background: var(--border);
    color: var(--text-bright);
  }

  #legend {
    height: var(--legend-h);
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 20px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .legend-swatch {
    width: 14px;
    height: 8px;
    border-radius: 1px;
  }

  .legend-marker {
    width: 8px;
    height: 8px;
    transform: rotate(45deg);
  }

  #main {
    display: flex;
    height: calc(100vh - var(--header-h) - var(--legend-h) - var(--trace-list-h));
  }

  #sidebar {
    width: var(--sidebar-w);
    background: var(--bg-header);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
  }

  /* ── Trace list strip ────────────────────────────────────────
     Horizontal chip bar sitting between #legend and #main. It is
     DELIBERATELY outside #main so that the sidebar's TIME row
     (now at the top of the sidebar) vertically aligns with the
     canvas's TIME axis (at the top of #canvas-wrap). If the strip
     were inside the sidebar it would push the sidebar's lane
     labels down while leaving the canvas untouched, creating a
     persistent off-by-N-px mis-alignment. */
  #trace-list {
    height: var(--trace-list-h);
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 12px;
    overflow-x: auto;
    overflow-y: hidden;
    flex-shrink: 0;
  }

  /* Drag-over highlight: reuses the same cyan glow on the strip
     AND the sidebar so both zones accept file drops clearly. */
  #trace-list.drop-over,
  #sidebar.drop-over {
    background: #121b28;
    box-shadow: inset 0 0 0 2px var(--cyan);
  }

  #trace-list-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    flex-shrink: 0;
  }

  #trace-items {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 0;
    overflow-x: auto;
  }

  #trace-items:empty::before {
    content: 'Drop .jsonl files here or click +';
    font-size: 10px;
    color: var(--text-dim);
    font-style: italic;
  }

  .trace-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 6px 3px 10px;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 10px;
    color: var(--text);
    background: var(--bg);
    max-width: 260px;
    flex-shrink: 0;
  }

  .trace-chip .trace-label {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  .trace-chip .trace-remove {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 14px;
    line-height: 1;
    padding: 0 4px;
    cursor: pointer;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .trace-chip .trace-remove:hover { color: var(--red); }

  .trace-add-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 12px;
    width: 22px;
    height: 22px;
    line-height: 1;
    border-radius: 50%;
    cursor: pointer;
    padding: 0;
    flex-shrink: 0;
    margin-left: auto;
  }
  .trace-add-btn:hover { color: var(--cyan); border-color: var(--cyan); }

  .lane-label {
    height: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 12px;
    border-bottom: 1px solid var(--grid);
  }

  .lane-label .trace-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-bright);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .lane-label .agent-name {
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #gantt-canvas {
    display: block;
    cursor: crosshair;
  }

  #tooltip {
    display: none;
    position: fixed;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
    max-width: 540px;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  /* When pinned, the tooltip stays put, gets a cyan accent border, and
     allows vertical scroll + manual resize so long llm_content blocks
     are readable. Hover tooltips keep content-hug sizing. */
  #tooltip.pinned {
    border-color: var(--cyan);
    max-height: 60vh;
    overflow-y: auto;
    resize: both;
    min-width: 320px;
  }

  #tooltip .tt-header {
    font-weight: 600;
    color: var(--text-bright);
    margin-bottom: 6px;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    /* Keep the header visible when the body scrolls. */
    position: sticky;
    top: -10px;
    background: var(--bg-panel);
    padding-top: 10px;
    margin-top: -10px;
  }

  #tooltip .tt-title {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #tooltip .tt-close {
    display: none;
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    padding: 0 4px;
    border-radius: 2px;
  }
  #tooltip.pinned .tt-close { display: inline-block; }
  #tooltip .tt-close:hover { color: var(--text-bright); background: var(--border); }

  #tooltip .tt-hint {
    display: none;
    margin-top: 8px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-dim);
    font-style: italic;
  }
  #tooltip.pinned .tt-hint { display: block; }

  #tooltip .tt-rows {
    display: grid;
    grid-template-columns: max-content 1fr;
    column-gap: 14px;
    row-gap: 2px;
    line-height: 1.6;
    font-size: 11px;
    max-width: 480px;
  }

  #tooltip .tt-key {
    color: var(--text-dim);
    white-space: nowrap;
  }

  #tooltip .tt-val {
    color: var(--text);
    word-break: break-all;
    /* Preserve newlines from multi-line detail values (e.g. multiple
       tool_calls_requested entries joined with \n) while still wrapping
       very long single-line values. */
    white-space: pre-wrap;
  }

  #source-ref {
    position: fixed;
    bottom: 8px;
    right: 12px;
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0.5;
  }
</style>
</head>
<body>

<div id="header">
  <span class="title">TRACE GANTT</span>
  <span class="meta" id="header-meta"></span>
  <div class="toggle-group">
    <button class="toggle-btn active" id="btn-sync" onclick="setTimeMode('sync')">SYNC</button>
    <button class="toggle-btn" id="btn-abs" onclick="setTimeMode('abs')">ABS</button>
  </div>
</div>

<div id="legend" role="presentation"></div>

<!-- Horizontal trace strip — sits above #main so the sidebar's TIME
     row and the canvas's TIME axis share the same y=0. Drag-drop
     target for .jsonl files; the sidebar is also a drop target. -->
<div id="trace-list">
  <span id="trace-list-label">TRACES</span>
  <div id="trace-items"></div>
  <button class="trace-add-btn" type="button" onclick="openFilePicker()" title="Add .jsonl trace">+</button>
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-lanes"></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="gantt-canvas"></canvas>
  </div>
</div>

<input id="trace-file-input" type="file" accept=".jsonl,application/jsonl,text/plain" multiple style="display:none">
<div id="tooltip"></div>
<div id="source-ref"></div>

<script>var __TRACE_DATA__ = __TRACE_JSON__;</script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" crossorigin>
<!-- gantt_builder.js — spliced in at build time by gantt_serve.py.
     Exposes window.GanttBuilder for browser-side trace parsing. -->
<script>
__GANTT_BUILDER_JS__
</script>
<script>
'use strict';

// ─── Registries ────────────────────────────────────────────────────
// Defaults — used as a fallback if the payload does not ship its own
// registries (older payloads, or template opened directly without data).
// The Python side (gantt_data.py) embeds DEFAULT_SPAN_REGISTRY /
// DEFAULT_MARKER_REGISTRY in DATA.registries so new action_types and
// event names can be added without editing this template.
const DEFAULT_SPANS = {
  llm:        { color: '#00E5FF', label: 'LLM Call',    order: 0 },
  tool:       { color: '#FF6D00', label: 'Tool Exec',   order: 1 },
  scheduling: { color: '#76FF03', label: 'Scheduling',  order: 2 },
};

const DEFAULT_MARKERS = {
  message_dispatch:    { symbol: 'diamond', color: '#76FF03' },
  session_lock_acquire:{ symbol: 'diamond', color: '#76FF03' },
  session_load:        { symbol: 'dot',     color: '#76FF03' },
  message_list_build:  { symbol: 'dot',     color: '#4FC3F7' },
  session_turn_save:   { symbol: 'dot',     color: '#76FF03' },
  task_complete:       { symbol: 'flag',    color: '#FF6D00' },
  llm_error:           { symbol: 'cross',   color: '#FF1744' },
  max_iterations:      { symbol: 'cross',   color: '#FF1744' },
  _default:            { symbol: 'dot',     color: '#6b7280' },
};

// Populated from DATA.registries during init() — kept as ``let`` so the
// initialization code can replace them in place.
let SPAN_REGISTRY = DEFAULT_SPANS;
let MARKER_REGISTRY = DEFAULT_MARKERS;

// Neutral grey for span types not present in the registry — guarantees
// the renderer never crashes on a forward-compatible payload.
const UNKNOWN_SPAN_STYLE = { color: '#6b7280', label: 'Unknown', order: 99 };

// ─── State ─────────────────────────────────────────────────────────
let DATA = null;
let timeMode = 'sync';   // 'sync' | 'abs'
const LANE_H = 60;
const SPAN_H = 18;
const MARKER_H = 6;
const TIME_AXIS_H = 28;
const SPAN_PAD = 4;

let hitBoxes = [];  // [{x, y, w, h, item}]

// When non-null, the tooltip is pinned to this hit and ignores mouseover
// updates. Cleared by click-on-empty, the × button, or ESC.
let pinnedHit = null;

// ─── Init ──────────────────────────────────────────────────────────
function init() {
  try {
    // Accept three init shapes:
    //   1) __TRACE_DATA__ undefined / null → show legacy error message.
    //   2) __TRACE_DATA__ with traces: [] → empty state (--empty flag).
    //   3) __TRACE_DATA__ with traces: [...] → CLI-embedded traces.
    if (typeof __TRACE_DATA__ === 'undefined' || !__TRACE_DATA__) {
      document.body.innerHTML = '<div style="padding:40px;color:#c5c8d4;font-family:monospace">No trace data embedded. Use: python -m trace_collect.cli gantt &lt;trace.jsonl&gt;</div>';
      return;
    }
    DATA = __TRACE_DATA__;
    // Adopt registries from payload if present, otherwise keep defaults.
    if (DATA.registries) {
      if (DATA.registries.spans)   SPAN_REGISTRY = DATA.registries.spans;
      if (DATA.registries.markers) MARKER_REGISTRY = DATA.registries.markers;
    }
    // Seed the LoadedTraces Map from any CLI-embedded traces so the user
    // can remove/augment them at runtime (the canonical source of truth
    // for DATA.traces going forward is LoadedTraces, not __TRACE_DATA__).
    // Disambiguate collisions (two CLI files with the same Path.stem) the
    // same way addTraceFile does, otherwise the second trace would
    // silently overwrite the first in the Map.
    if (Array.isArray(DATA.traces)) {
      for (const tp of DATA.traces) {
        const baseLabel = tp.id || `trace_${LoadedTraces.size + 1}`;
        let label = baseLabel;
        let n = 2;
        while (LoadedTraces.has(label)) {
          label = `${baseLabel}_${n}`;
          n += 1;
        }
        LoadedTraces.set(label, { payload: tp });
      }
    }
    buildLegend();
    buildTraceList();
    buildSidebar();
    updateHeaderMeta();
    setupCanvas();
    setupTraceLoading();
  } catch (err) {
    document.body.innerHTML = `<pre style="padding:40px;color:#FF1744;font-family:monospace">${esc(err.stack || err.message)}</pre>`;
  }
}

// ─── Legend ─────────────────────────────────────────────────────────
function buildLegend() {
  const el = document.getElementById('legend');
  let html = '';
  for (const [type, reg] of Object.entries(SPAN_REGISTRY)) {
    html += `<div class="legend-item"><div class="legend-swatch" style="background:${reg.color}"></div>${reg.label}</div>`;
  }
  html += `<div class="legend-item"><div class="legend-marker" style="background:#76FF03"></div>Event Marker</div>`;
  el.innerHTML = html;
}

// ─── Sidebar ───────────────────────────────────────────────────────
function buildSidebar() {
  const el = document.getElementById('sidebar-lanes');
  let html = '';
  // Time axis row
  html += `<div class="lane-label" style="height:${TIME_AXIS_H}px"><span class="trace-name" style="font-size:10px;color:var(--text-dim)">TIME</span></div>`;
  for (const trace of DATA.traces) {
    const m = trace.metadata;
    const hoverParts = [
      `scaffold: ${m.scaffold}`,
      `model: ${m.model||'?'}`,
      `instance: ${m.instance_id||'?'}`,
      `max_iterations: ${m.max_iterations||'?'}`,
      `actions: ${m.n_actions}`,
      `iterations: ${m.n_iterations}`,
      `events: ${m.n_events}`,
      `elapsed: ${(m.elapsed_s||0).toFixed(1)}s`,
    ];
    const hoverText = hoverParts.join('\n');
    const displayName = `${m.scaffold} (${m.model||'?'})`;
    for (const lane of trace.lanes) {
      html += `<div class="lane-label" title="${esc(hoverText)}"><span class="trace-name">${esc(displayName)}</span><span class="agent-name">${esc(lane.agent_id)}</span></div>`;
    }
  }
  el.innerHTML = html;
}

// ─── Trace list (add/remove UI) ─────────────────────────────────────
// Canonical store of loaded traces. Keys are labels (filename stems or
// CLI-provided trace ids). Values are {payload} — the JS-built or CLI-
// provided payload dict that DATA.traces points at after each rebuild.
const LoadedTraces = new Map();

function buildTraceList() {
  const el = document.getElementById('trace-items');
  if (!el) return;
  let html = '';
  // Use a data-label attribute + delegated click handler instead of an
  // inline onclick — interpolating JSON.stringify(label) into a double-
  // quoted onclick attribute terminates the attribute mid-value for any
  // plain-ASCII label (e.g. ``removeTrace("foo")`` breaks the HTML).
  for (const [label] of LoadedTraces) {
    html += (
      '<span class="trace-chip">' +
        `<span class="trace-label" title="${esc(label)}">${esc(label)}</span>` +
        `<button class="trace-remove" type="button" title="Remove" data-label="${esc(label)}">&times;</button>` +
      '</span>'
    );
  }
  el.innerHTML = html;
}

// Delegated click handler — attached once in init(), survives every
// subsequent innerHTML rebuild of #trace-items.
function onTraceItemsClick(e) {
  const btn = e.target.closest('.trace-remove');
  if (!btn) return;
  const label = btn.getAttribute('data-label');
  if (label !== null) removeTrace(label);
}

function rebuildDataFromLoaded() {
  if (!DATA) DATA = { registries: { spans: SPAN_REGISTRY, markers: MARKER_REGISTRY }, traces: [] };
  DATA.traces = [...LoadedTraces.values()].map(v => v.payload);
}

function rerender() {
  rebuildDataFromLoaded();
  buildTraceList();
  buildSidebar();
  updateHeaderMeta();
  render();
  // render() rebuilt hitBoxes from scratch, so the pinned hitBox we
  // captured at click time is stale. Re-anchor (or unpin) so the pinned
  // tooltip tracks its underlying item across trace add/remove.
  reanchorPinned();
}

// Re-anchor the pinned tooltip to its underlying item's fresh hitBox.
// If the item is no longer represented (trace removed, lane re-laid out
// off-screen), unpin cleanly. Called after any render() that rebuilds
// hitBoxes — both resize() and rerender().
function reanchorPinned() {
  if (!pinnedHit) return;
  const fresh = hitBoxes.find(b => b.item === pinnedHit.item);
  if (!fresh) {
    unpin();
    return;
  }
  pinnedHit = fresh;
  const canvas = document.getElementById('gantt-canvas');
  const rect = canvas.getBoundingClientRect();
  const cx = rect.left + fresh.x + fresh.w / 2;
  const cy = rect.top + fresh.y + fresh.h / 2;
  positionTooltip(cx, cy, document.getElementById('tooltip'));
}

async function addTraceFile(file) {
  if (!file) return;
  const text = await file.text();
  let parsed;
  try {
    parsed = GanttBuilder.parseJsonl(text);
  } catch (err) {
    console.error('Failed to parse', file.name, err);
    return;
  }
  // Disambiguate duplicate filenames by suffixing _2, _3, ...
  const baseLabel = file.name.replace(/\.jsonl$/i, '');
  let label = baseLabel;
  let n = 2;
  while (LoadedTraces.has(label)) {
    label = `${baseLabel}_${n}`;
    n += 1;
  }
  const payload = GanttBuilder.buildPayload(parsed, label);
  LoadedTraces.set(label, { payload });
  rerender();
}

function removeTrace(label) {
  if (!LoadedTraces.has(label)) return;
  LoadedTraces.delete(label);
  // If the pinned tooltip belonged to a removed trace's lane, clear it.
  if (pinnedHit) {
    const stillReferenced = [...LoadedTraces.values()].some(v =>
      v.payload.lanes.some(lane =>
        lane.spans.includes(pinnedHit.item) || lane.markers.includes(pinnedHit.item)
      )
    );
    if (!stillReferenced) unpin();
  }
  rerender();
}

function openFilePicker() {
  document.getElementById('trace-file-input').click();
}

function setupTraceLoading() {
  const input = document.getElementById('trace-file-input');
  input.addEventListener('change', async (e) => {
    const files = Array.from(e.target.files || []);
    for (const f of files) { await addTraceFile(f); }
    input.value = '';  // allow re-picking the same file
  });

  // Delegated click handler for trace-chip remove buttons. Attached once
  // to the stable #trace-items container so it survives the innerHTML
  // rebuild inside buildTraceList().
  const items = document.getElementById('trace-items');
  if (items) items.addEventListener('click', onTraceItemsClick);

  // Drag-drop targets: the horizontal trace strip AND the sidebar both
  // accept .jsonl drops. Highlighting the strip on dragover gives the
  // primary affordance; the sidebar is a backup zone that also lights up.
  for (const id of ['trace-list', 'sidebar']) {
    const zone = document.getElementById(id);
    if (!zone) continue;
    ['dragenter', 'dragover'].forEach(ev => {
      zone.addEventListener(ev, (e) => {
        e.preventDefault();
        e.stopPropagation();
        zone.classList.add('drop-over');
      });
    });
    ['dragleave', 'dragend'].forEach(ev => {
      zone.addEventListener(ev, (e) => {
        if (e.target === zone) zone.classList.remove('drop-over');
      });
    });
    zone.addEventListener('drop', async (e) => {
      e.preventDefault();
      e.stopPropagation();
      zone.classList.remove('drop-over');
      const files = Array.from(e.dataTransfer?.files || [])
        .filter(f => /\.jsonl$/i.test(f.name));
      for (const f of files) { await addTraceFile(f); }
    });
  }

  // Block default drag-drop on the whole document so files dropped outside
  // the drop zones don't navigate the browser away from the page.
  window.addEventListener('dragover', (e) => e.preventDefault());
  window.addEventListener('drop', (e) => e.preventDefault());
}

// ─── Header meta ───────────────────────────────────────────────────
function updateHeaderMeta() {
  const parts = [];
  for (const t of DATA.traces) {
    const m = t.metadata;
    parts.push(`${m.scaffold} ${m.model||''} (${m.n_actions} actions / ${m.n_iterations} iters, ${(m.elapsed_s||0).toFixed(1)}s)`);
  }
  document.getElementById('header-meta').textContent = parts.join(' vs ');
}

// ─── Canvas setup ──────────────────────────────────────────────────
function setupCanvas() {
  const canvas = document.getElementById('gantt-canvas');
  const wrap = document.getElementById('canvas-wrap');

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = wrap.clientWidth * dpr;
    canvas.height = wrap.clientHeight * dpr;
    canvas.style.width = wrap.clientWidth + 'px';
    canvas.style.height = wrap.clientHeight + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    render();
    reanchorPinned();
  }

  new ResizeObserver(resize).observe(wrap);
  resize();

  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseleave', () => {
    // Don't hide a pinned tooltip when the cursor leaves the canvas.
    if (pinnedHit) return;
    document.getElementById('tooltip').style.display = 'none';
  });
  canvas.addEventListener('click', onCanvasClick);

  // Global ESC handler unpins the tooltip.
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') unpin();
  });
}

// ─── Pin / unpin ───────────────────────────────────────────────────
function pin(hit, clientX, clientY) {
  pinnedHit = hit;
  const tooltip = document.getElementById('tooltip');
  tooltip.classList.add('pinned');
  showTooltipFor(hit);
  positionTooltip(clientX, clientY, tooltip);
}

function unpin() {
  pinnedHit = null;
  const tooltip = document.getElementById('tooltip');
  tooltip.classList.remove('pinned');
  tooltip.style.display = 'none';
  // Reset any user-applied resize so the next hover tooltip sizes to content.
  tooltip.style.width = '';
  tooltip.style.height = '';
}

function onCanvasClick(e) {
  const canvas = document.getElementById('gantt-canvas');
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const hit = hitTest(mx, my);
  if (hit) {
    pin(hit, e.clientX, e.clientY);
  } else {
    unpin();
  }
}

function hitTest(mx, my) {
  for (let i = hitBoxes.length - 1; i >= 0; i--) {
    const b = hitBoxes[i];
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) return b;
  }
  return null;
}

// ─── Time mode toggle ──────────────────────────────────────────────
function setTimeMode(mode) {
  timeMode = mode;
  document.getElementById('btn-sync').classList.toggle('active', mode === 'sync');
  document.getElementById('btn-abs').classList.toggle('active', mode === 'abs');
  render();
}

// ─── Render ────────────────────────────────────────────────────────
function render() {
  if (!DATA) return;
  const canvas = document.getElementById('gantt-canvas');
  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  const ctx = canvas.getContext('2d');

  ctx.clearRect(0, 0, W, H);
  hitBoxes = [];

  // Compute time range
  let tMin = Infinity, tMax = -Infinity;
  for (const trace of DATA.traces) {
    for (const lane of trace.lanes) {
      for (const s of lane.spans) {
        const s0 = timeMode === 'sync' ? s.start : s.start_abs;
        const s1 = timeMode === 'sync' ? s.end : s.end_abs;
        if (s0 < tMin) tMin = s0;
        if (s1 > tMax) tMax = s1;
      }
      for (const m of lane.markers) {
        const mt = timeMode === 'sync' ? m.t : m.t_abs;
        if (mt < tMin) tMin = mt;
        if (mt > tMax) tMax = mt;
      }
    }
  }

  if (!isFinite(tMin)) { tMin = 0; tMax = 1; }
  const tRange = tMax - tMin || 1;
  const margin = tRange * 0.02;
  tMin -= margin;
  tMax += margin;
  const totalRange = tMax - tMin;

  const tToX = (t) => ((t - tMin) / totalRange) * W;

  // Count total lanes
  let totalLanes = 0;
  for (const trace of DATA.traces) totalLanes += trace.lanes.length;

  // ── Draw grid ──
  ctx.strokeStyle = '#141a24';
  ctx.lineWidth = 1;
  const gridStep = niceStep(totalRange, W / 80);
  let gridT = Math.ceil(tMin / gridStep) * gridStep;
  while (gridT <= tMax) {
    const x = tToX(gridT);
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
    gridT += gridStep;
  }

  // ── Draw time axis ──
  ctx.fillStyle = '#6b7280';
  ctx.font = '10px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  gridT = Math.ceil(tMin / gridStep) * gridStep;
  while (gridT <= tMax) {
    const x = tToX(gridT);
    const label = timeMode === 'sync'
      ? formatSyncTime(gridT)
      : formatAbsTime(gridT);
    ctx.fillText(label, x, TIME_AXIS_H - 6);
    gridT += gridStep;
  }

  // ── Draw lanes ──
  let laneY = TIME_AXIS_H;

  for (const trace of DATA.traces) {
    for (const lane of trace.lanes) {
      // Lane background
      ctx.fillStyle = '#0c1018';
      ctx.fillRect(0, laneY, W, LANE_H);

      // Lane separator
      ctx.strokeStyle = '#1a1f2e';
      ctx.beginPath();
      ctx.moveTo(0, laneY + LANE_H);
      ctx.lineTo(W, laneY + LANE_H);
      ctx.stroke();

      // ── Draw spans ──
      // Group by iteration, stack LLM and tool within lane
      const spansByStep = {};
      for (const s of lane.spans) {
        const key = s.iteration;
        if (!spansByStep[key]) spansByStep[key] = [];
        spansByStep[key].push(s);
      }

      for (const spans of Object.values(spansByStep)) {
        spans.sort((a, b) => (SPAN_REGISTRY[a.type]?.order ?? 99) - (SPAN_REGISTRY[b.type]?.order ?? 99));
        for (let i = 0; i < spans.length; i++) {
          const s = spans[i];
          // Forward-compatible: unknown span types render in neutral grey
          // (UNKNOWN_SPAN_STYLE) instead of crashing the renderer.
          const reg = SPAN_REGISTRY[s.type] || UNKNOWN_SPAN_STYLE;
          const st = timeMode === 'sync' ? s.start : s.start_abs;
          const et = timeMode === 'sync' ? s.end : s.end_abs;
          const x0 = tToX(st);
          const x1 = tToX(et);
          const w = Math.max(x1 - x0, 3); // minimum visible width
          const yOff = laneY + SPAN_PAD + i * (SPAN_H + 2);

          // Span bar
          ctx.fillStyle = reg.color;
          ctx.globalAlpha = 0.85;
          ctx.fillRect(x0, yOff, w, SPAN_H);
          ctx.globalAlpha = 1;

          // Step label
          if (w > 20) {
            ctx.fillStyle = '#000';
            ctx.font = '9px JetBrains Mono, monospace';
            ctx.textAlign = 'left';
            ctx.fillText(`${s.iteration}`, x0 + 3, yOff + 12);
          }

          hitBoxes.push({ x: x0, y: yOff, w: w, h: SPAN_H, item: s, kind: 'span' });
        }
      }

      // ── Draw markers ──
      for (const m of lane.markers) {
        const mt = timeMode === 'sync' ? m.t : m.t_abs;
        const x = tToX(mt);
        const reg = MARKER_REGISTRY[m.event] || MARKER_REGISTRY._default;
        const cy = laneY + LANE_H - MARKER_H - 2;

        ctx.fillStyle = reg.color;
        ctx.globalAlpha = 0.7;

        if (reg.symbol === 'diamond') {
          ctx.save();
          ctx.translate(x, cy);
          ctx.rotate(Math.PI / 4);
          ctx.fillRect(-3, -3, 6, 6);
          ctx.restore();
        } else if (reg.symbol === 'flag') {
          ctx.fillRect(x - 1, cy - 6, 2, 10);
          ctx.fillRect(x + 1, cy - 6, 6, 4);
        } else if (reg.symbol === 'cross') {
          ctx.fillRect(x - 4, cy - 1, 8, 2);
          ctx.fillRect(x - 1, cy - 4, 2, 8);
        } else {
          ctx.beginPath();
          ctx.arc(x, cy, 3, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.globalAlpha = 1;
        hitBoxes.push({ x: x - 6, y: cy - 6, w: 12, h: 12, item: m, kind: 'marker' });
      }

      laneY += LANE_H;
    }
  }
}

// ─── Mouse / Tooltip ───────────────────────────────────────────────
function onMouseMove(e) {
  // Pinned tooltip: ignore hover updates entirely.
  if (pinnedHit) return;

  const canvas = document.getElementById('gantt-canvas');
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const hit = hitTest(mx, my);

  const tooltip = document.getElementById('tooltip');
  if (!hit) {
    tooltip.style.display = 'none';
    return;
  }

  showTooltipFor(hit);
  positionTooltip(e.clientX, e.clientY, tooltip);
}

// Build the tooltip HTML for a given hit and display it. Shared between
// hover (onMouseMove) and click-to-pin (pin) paths.
function showTooltipFor(hit) {
  const tooltip = document.getElementById('tooltip');
  let titleColor = '#fff';
  let titleText = '';
  const rows = [];

  if (hit.kind === 'span') {
    const s = hit.item;
    const reg = SPAN_REGISTRY[s.type] || UNKNOWN_SPAN_STYLE;
    titleColor = reg.color || '#fff';
    titleText = `${reg.label || s.type} — Iter ${s.iteration}`;
    const dur = ((s.end_abs - s.start_abs) * 1000).toFixed(1);
    rows.push(['Duration', dur + ' ms']);
    rows.push(['Start', formatAbsTime(s.start_abs)]);
    rows.push(['Relative', '+' + s.start.toFixed(3) + 's']);
    for (const [k, v] of Object.entries(s.detail || {})) {
      if (v === null || v === undefined || v === '') continue;
      rows.push([k, formatDetailValue(v)]);
    }
  } else {
    const m = hit.item;
    const reg = MARKER_REGISTRY[m.event] || MARKER_REGISTRY._default;
    titleColor = reg.color || '#fff';
    titleText = `${m.event} — Iter ${m.iteration}`;
    rows.push(['Time', formatAbsTime(m.t_abs)]);
    rows.push(['Relative', '+' + m.t.toFixed(3) + 's']);
    for (const [k, v] of Object.entries(m.detail || {})) {
      if (v === null || v === undefined || v === '') continue;
      rows.push([k, formatDetailValue(v)]);
    }
  }

  const headerHtml =
    `<div class="tt-header" style="color:${titleColor}">
       <span class="tt-title">${esc(titleText)}</span>
       <button class="tt-close" type="button" onclick="unpin()" title="Unpin (ESC)">&times;</button>
     </div>`;
  const rowsHtml =
    '<div class="tt-rows">' +
    rows.map(([k, v]) =>
      `<span class="tt-key">${esc(k)}</span><span class="tt-val">${esc(v)}</span>`
    ).join('') +
    '</div>';
  const hintHtml = '<div class="tt-hint">Click canvas or press ESC to unpin</div>';

  tooltip.innerHTML = headerHtml + rowsHtml + hintHtml;
  tooltip.style.display = 'block';
}

// Format an arbitrary detail value (string / number / array / object) into
// a string suitable for inlining into a tooltip row. Arrays are joined with
// newlines so multi-tool-call summaries display as stacked lines.
function formatDetailValue(v) {
  if (Array.isArray(v)) return v.map(x => String(x)).join('\n');
  if (v && typeof v === 'object') return JSON.stringify(v);
  return String(v);
}

function positionTooltip(clientX, clientY, tooltip) {
  const tx = clientX + 16;
  const ty = clientY + 16;
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  tooltip.style.left = (tx + tw > window.innerWidth ? clientX - tw - 8 : tx) + 'px';
  tooltip.style.top = (ty + th > window.innerHeight ? clientY - th - 8 : ty) + 'px';
}

// ─── Time formatting ───────────────────────────────────────────────
function formatSyncTime(t) {
  if (t < 0) return t.toFixed(1) + 's';
  if (t < 60) return '+' + t.toFixed(1) + 's';
  const m = Math.floor(t / 60);
  const s = (t % 60).toFixed(0);
  return `+${m}m${s.padStart(2, '0')}s`;
}

function formatAbsTime(ts) {
  const d = new Date(ts * 1000);
  return d.toTimeString().substring(0, 8);
}

function niceStep(range, minPx) {
  const raw = range / Math.max(1, Math.floor(minPx));
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const norm = raw / mag;
  let nice;
  if (norm <= 1) nice = 1;
  else if (norm <= 2) nice = 2;
  else if (norm <= 5) nice = 5;
  else nice = 10;
  return nice * mag;
}

function esc(s) {
  if (typeof s !== 'string') s = String(s);
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ─── Boot ──────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
