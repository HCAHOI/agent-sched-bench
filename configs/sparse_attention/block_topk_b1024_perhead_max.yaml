# Arm A — block_topk head-max scoring + per-head counterfactual top-k recording.
#
# Experiment goal: capture, in ONE recording run, the per-head independent
# top-k block selections under the CURRENT head-max pooling (status quo). This
# removes the censoring of earlier runs (which only kept attention on
# pool-selected blocks) so we can finally measure, uncensored, how much heads
# disagree (pairwise Jaccard), how large their union is, and how that union
# relates to the pooled keep set.
#
# Expected readout: head-pair top-16 Jaccard ≈ 0.10–0.19 and 32-head top-16
# union ≈ 30–64% of candidates (the offline-sim numbers, now without
# censoring); plus the union-vs-actually-kept gap that head-max pooling leaves.
#
# Pair with Arm B (block_topk_b1024_perhead_vote.yaml) which only flips
# score_reduction to "vote" — same recording knobs — for the cross-head-voting
# comparison arm.
#
# Recording knobs (per_head_stats_layers / record_per_head_topk /
# per_head_topk_rank) are CLI flags, not sparse_attention YAML fields. Run with:
#
#   python -m trace_collect.cli \
#     --provider ... --model ... --scaffold openclaw --benchmark ... \
#     --record-internals \
#     --sparse-attn-config configs/sparse_attention/block_topk_b1024_perhead_max.yaml \
#     --per-head-stats-layers 0,4,9,13,16,18,20,22,25,27,32,38,43,47 \
#     --record-per-head-topk --per-head-topk-rank 64
#
# --per-head-stats-layers: 14-layer densified mid-stack sample. Uniform coverage
#   across the 48-layer stack PLUS densification at L14–22, because prior
#   head-divergence analysis located the per-head focus split peaking at L18 but
#   the 6-layer sample (0,9,18,27,38,47) could not resolve the WIDTH of that
#   valley. The extra L16/20/22 + L13/25 probes bracket it.
name: block_topk
budget: 1024
sink_size: 4
recent_window: 256
block_size: 16
score_reduction: max
phase_scope: decode_only
record: true
observe_only: true
