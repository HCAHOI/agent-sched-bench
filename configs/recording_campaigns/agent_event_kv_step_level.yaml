# Campaign: agent-event-gated KV dynamics at DECODE-STEP granularity
# ============================================================================
# Pre-registered question (after the 6-experiment locality sweep killed all
# call-level signals): do program-structure signals — tool-failure events,
# within-call dynamics, content-reuse lead-times — exist at decode-STEP
# granularity? Call-level aggregation conflated them (docs/analysis/
# attention_locality_20260610.md §3); per-decode-step selection logs are the
# decisive test. ONE GPU campaign answers everything below.
#
# This manifest is DOCUMENTATION + a parameter ledger. It is NOT consumed by a
# runner — trace_collect.cli has no --campaign flag. Each arm lists the exact
# `python -m trace_collect.cli` invocation. The arm-specific sparse method lives
# in its own configs/sparse_attention/*.yaml (referenced, never duplicated);
# the per-head recording knobs are GLOBAL CLI flags (same for every task).
#
# Model:    Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8 (project default; 30B-A3B MoE,
#           48 layers, 32 query head × 4 KV head). Second-model arm: see below.
# Scaffold: openclaw   Provider: (host HF recording backend via --record-internals)
# ============================================================================

campaign: agent_event_kv_step_level
trace_format_version: 5

# ---------------------------------------------------------------------------
# Recording switches REQUIRED on every task (root cause of last campaign's
# 1-of-4 full-step-extras gap was a config omission, NOT a code path that
# skips steps).
#
# Mechanism: SparseAttentionConfig.record=True (the `record: true` line in each
# arm's sparse yaml) gates per-call SparseAttentionRecorder creation
# (backend_hf.py). When on, EVERY decode step that fires the sparse pre-hook
# writes one sparse_attention.npz row whose extras_json carries
# `selected_middle_indices` / `selected_blocks` — full-step, no ring-buffer
# trim (the sparse recorder appends to a plain list, unlike the
# decode_window-bounded attention ring buffer). A task only lacks full-step
# extras if it ran WITHOUT a record:true sparse config. The previous campaign's
# other 3 runs omitted --sparse-attn-config, so no sparse_attention.npz existed
# for them. Fix = pass the arm's --sparse-attn-config (record:true) on ALL
# tasks. No code change.
# ---------------------------------------------------------------------------
recording_switches:
  record_internals: true            # CLI --record-internals (HF backend, concurrency=1)
  sparse_attn_record: true          # `record: true` in each arm's sparse yaml -> full-step extras_json
  sparse_attn_observe_only: true    # `observe_only: true`: record what sparse WOULD select; do not degrade generation
  record_per_head_topk: true        # CLI --record-per-head-topk (commit 2fd7ca8 counterfactual export)
  per_head_topk_rank: 64            # CLI --per-head-topk-rank
  per_head_stats_layers: "0,4,9,13,16,18,20,22,25,27,32,38,43,47"  # 14-layer densified mid-stack (see arm yaml headers)
  # exit_code / tool_error segment metadata: ALWAYS-ON, no switch. It is plain
  # per-tool-result segment metadata written by recording.parse_tool_exit_code /
  # detect_tool_error into segments.json (bytes-scale; absent/unknown -> None,
  # never a guessed 0). Old segment readers use dict.get, so unaffected.

# ---------------------------------------------------------------------------
# Arms. Arm A/B differ ONLY in score_reduction (max vs vote); both carry
# record_per_head_topk via the shared global flags above. Run each arm over the
# SAME task set so vote-vs-max is paired per (task, call, step).
# ---------------------------------------------------------------------------
arms:
  - id: A_block_topk_max
    role: status-quo head-max pooling + per-head counterfactual export
    sparse_attn_config: configs/sparse_attention/block_topk_b1024_perhead_max.yaml
    score_reduction: max
    invocation: >-
      python -m trace_collect.cli
      --provider <PROVIDER> --model Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8
      --scaffold openclaw --benchmark <BENCHMARK> --mcp-config configs/mcp/context7.yaml
      --record-internals
      --sparse-attn-config configs/sparse_attention/block_topk_b1024_perhead_max.yaml
      --per-head-stats-layers 0,4,9,13,16,18,20,22,25,27,32,38,43,47
      --record-per-head-topk --per-head-topk-rank 64
      --instance-ids <TASK_MIX_IDS>

  - id: B_block_topk_vote
    role: cross-head vote scoring (drops no-consensus blocks) + per-head export
    sparse_attn_config: configs/sparse_attention/block_topk_b1024_perhead_vote.yaml
    score_reduction: vote
    invocation: >-
      python -m trace_collect.cli
      --provider <PROVIDER> --model Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8
      --scaffold openclaw --benchmark <BENCHMARK> --mcp-config configs/mcp/context7.yaml
      --record-internals
      --sparse-attn-config configs/sparse_attention/block_topk_b1024_perhead_vote.yaml
      --per-head-stats-layers 0,4,9,13,16,18,20,22,25,27,32,38,43,47
      --record-per-head-topk --per-head-topk-rank 64
      --instance-ids <TASK_MIX_IDS>

  # External-validity arm. Defends against "the step-level signal is a quirk of
  # one model." Same recording switches; 2-3 traces is enough to show the
  # event-gated effect (or its absence) reproduces on a different model family.
  # MODEL LEFT AS AN EXPLICIT TODO FOR THE USER — do not pick it here. The
  # block_topk layer set (--per-head-stats-layers) assumes a 48-layer stack; a
  # model with a different depth needs its own layer list (re-derive uniform +
  # mid-stack densification for that depth).
  - id: C_second_model
    role: external-validity replication (2-3 traces)
    model: TODO_USER_PICK_SECOND_MODEL    # <-- user fills in; must re-check --per-head-stats-layers for its depth
    sparse_attn_config: configs/sparse_attention/block_topk_b1024_perhead_max.yaml
    score_reduction: max
    n_traces: 3
    invocation: >-
      python -m trace_collect.cli
      --provider <PROVIDER> --model <TODO_USER_PICK_SECOND_MODEL>
      --scaffold openclaw --benchmark <BENCHMARK> --mcp-config configs/mcp/context7.yaml
      --record-internals
      --sparse-attn-config configs/sparse_attention/block_topk_b1024_perhead_max.yaml
      --per-head-stats-layers <TODO_LAYERS_FOR_MODEL_DEPTH>
      --record-per-head-topk --per-head-topk-rank 64
      --instance-ids <TASK_MIX_SUBSET_IDS>

# ---------------------------------------------------------------------------
# Task mix. The event-gated hypothesis needs EVENT YIELD: the previous 4 traces
# were read-heavy (few nonzero exits, few edit/write loops) so the failed-tool
# -> KV-revival test had almost no positive events to gate on. Require a mix
# that manufactures events through legitimate task selection (not synthetic
# injection): edit/write loops produce content-reuse lead-times; failing-test /
# nonzero-exit tasks produce the failure events the exit_code metadata labels.
#
# Instance IDs are intentionally left as placeholders — they are
# benchmark-specific and must be chosen by inspecting the actual dataset (do NOT
# hardcode dataset names or task ids in src/; per CLAUDE.md benchmark-plugin
# rules, selection stays in config/CLI). Fill `instance_ids` below per category.
# ---------------------------------------------------------------------------
# Selection provenance (2026-06-12): instances chosen by behavioral profiling of
# the 75 historical traces under traces/{swe-rebench,terminal-bench}/ — per task:
# write_file+edit_file count (mutation), nonzero `Exit code:` count + leading
# `Error` results (failure), llm_call count (length). Profiling script archived at
# docs/analysis/locality_ideation_20260611/task_profile.py. Selection is by EVENT
# YIELD (the independent variable, for statistical power), never by task outcome;
# the mixed_baseline category preserves the read-heavy null. Caveat: profiles from
# GLM-5.1/haiku runs are cross-model references for task nature; tasks with
# Qwen3-Coder-FP8 evidence are marked [qwen]. Instance prefix = benchmark slug.
task_mix:
  min_total_traces: 8
  benchmarks: [swe-rebench, terminal-bench]   # instance prefix selects the benchmark
  categories:
    - name: mutation_heavy
      why: edit/write-file loops -> content-reuse lead-time signal at step level
      min_count: 3
      instance_ids:
        - terminal-bench:cartpole-rl-training            # mut=18 fail=5 (34 calls)
        - swe-rebench:beeware__briefcase-817             # mut=17 fail=4 (90 calls)
        - terminal-bench:schemelike-metacircular-eval    # mut=14 fail=4 (34 calls) [qwen]
        - terminal-bench:ode-solver-rk4                  # mut=9 (24 calls) [qwen]; short-task spare
    - name: failure_rich
      why: failing tests / nonzero exit codes -> failed-tool -> KV-revival events
      min_count: 3
      instance_ids:
        - swe-rebench:python-graphblas__python-graphblas-217  # fail=26 (100 calls, hit max_iterations: a genuine struggle task)
        - swe-rebench:Zulko__moviepy-1329                # fail=14 (70 calls)
        - terminal-bench:db-wal-recovery                 # fail=11 (62 calls); TB-side failure representative
    - name: mixed_baseline
      why: keep a read-heavy contrast so event-gating is measured against a null
      min_count: 2
      instance_ids:
        - terminal-bench:fix-git                         # 47 calls [qwen]; longitudinal comparability with the 20260606 analysis
        - terminal-bench:causal-inference-r              # 29 calls [qwen]; same

