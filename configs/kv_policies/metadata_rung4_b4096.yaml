# Exploratory breadth-probe config (NOT a frozen campaign prior).
# Residency CAP is 4096: the metadata policy selects 3840 tokens (budget) and
# batch eviction lets up to `eviction_margin` (256) most-recent tokens linger
# before a single drop, so non-system residency oscillates in [3840, 4096] and
# never exceeds 4096. This keeps the metadata arm's resource bound honestly
# equal to (not above) the 4096 label it is compared against — the arm is on
# average slightly *under* 4096, i.e. conservative. reserve_system_prompt pins
# the ~2.5k-tok system span outside this budget (default True, set explicit).
name: metadata
budget: 3840
# Batch eviction: defer the physical drop until 256 tokens are pending
# eviction, then drop them all at once. Amortizes the per-token index_select
# rebuild 256x — without it the FP8/triton forward goes CPU-dispatch-bound and
# GPU-starved (29-min decode stall observed at seed0/~8.7k ctx). 256 trades
# amortization depth against residency-cap headroom (target+margin=4096).
eviction_margin: 256
sink_size: 4
recent_window: 256
metadata_rung: rung4
reserve_system_prompt: true
record: false
