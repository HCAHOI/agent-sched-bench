# Random KV eviction control (H2O paper's control baseline), matched to the
# metadata residency-cap comparison: target budget 3840 + eviction_margin 256
# = residency cap 4096. Every position in [0, key_len) is equally evictable, no
# recency carve-out. `seed` fixes the evict mask (independent of the generation
# seed swept by --seed). record off (perf).
name: random
budget: 3840
eviction_margin: 256
seed: 0
record: false
