# H2O (Heavy-Hitter Oracle, Zhang et al. NeurIPS 2023, arXiv:2306.14048),
# matched to the metadata residency-cap comparison: target budget 3840 +
# eviction_margin 256 = residency cap 4096. Keep set = sink + recent +
# top-(3840 - 4 - 256 = 3580) middle positions by accumulated post-softmax
# attention. NOTE: h2o requires attention artifacts, so it must run WITH
# --record-internals (record_artifacts=True) — it cannot run lean like the
# other arms. record:false only skips kv_eviction.npz; attention capture stays
# on (that is the re-softmax cost h2o intrinsically pays). prefill_mode full =
# paper-faithful (all prefill query rows streamed, no sampling bias).
name: h2o
budget: 3840
eviction_margin: 256
sink_size: 4
recent_window: 256
heavy_ratio: 0.5
aggregate: sum
ema_decay: 0.9
prefill_mode: full
record: false
