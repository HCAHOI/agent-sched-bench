[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-sched-bench"
version = "0.1.0"
description = "Benchmark environment for agent scheduling research"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "hydra-core>=1.3,<2.0",
  "httpx>=0.27,<1.0",
  "openai>=1.75,<2.0",
  "pandas>=2.2,<3.0",
  "PyYAML>=6.0,<7.0",
  "trafilatura>=2.0,<3.0",
  "matplotlib>=3.8,<4.0",
  "tqdm>=4.66,<5.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3,<9.0",
  "pytest-asyncio>=0.26,<1.0",
  "ruff>=0.11,<1.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 88
target-version = "py311"
